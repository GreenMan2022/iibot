<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Чат - Рабочая версия</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 22px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header p {
            margin: 6px 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }
        .api-key-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 12px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f5f7fa;
        }
        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 22px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .bot-message {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0,0,0,0.07);
        }
        .message-info {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-area {
            padding: 22px 24px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
        }
        #userInput {
            flex: 1;
            padding: 16px 22px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            outline: none;
            font-size: 1rem;
            transition: 0.2s;
            background: #f8fafc;
        }
        #userInput:focus {
            border-color: #667eea;
            background: white;
        }
        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 36px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px -8px #667eea;
        }
        #sendBtn:hover { transform: scale(1.02); opacity: 0.9; }
        #sendBtn:disabled {
            background: #94a3b8;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 22px;
            background: white;
            border-radius: 26px;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0,0,0,0.07);
        }
        .typing-indicator span {
            width: 9px;
            height: 9px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 12px 18px;
            border-radius: 16px;
            align-self: center;
        }
        .method-badge {
            background: #059669;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>⚡ AI Чат <span class="method-badge">многопрокси</span></h1>
            <p>ApiFreeLLM · автоматический выбор канала связи</p>
            <div class="api-key-badge">🔑 apf_i6fhd1fenfma3zg2ceoaa5y5</div>
        </div>

        <div id="messages" class="messages-area">
            <div class="message bot-message">
                👋 Привет! Система автоматически выберет рабочий канал связи.
                <div class="message-info">⚡ пробуем несколько прокси одновременно</div>
            </div>
        </div>

        <div id="rateLimitNotice" class="rate-limit-note" style="display: none; text-align: center; padding: 8px; background: #fef3c7; color: #92400e; border-radius: 40px; margin: 10px;">
            ⏳ Пожалуйста, подождите 25 секунд...
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твое сообщение..." autofocus>
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        // Конфигурация
        const API_KEY = "apf_i6fhd1fenfma3zg2ceoaa5y5";
        const API_URL = "https://apifreellm.com/api/v1/chat";
        
        // МАССИВ РАЗНЫХ МЕТОДОВ ОБХОДА CORS
        const METHODS = [
            {
                name: "cors.sh",
                url: "https://proxy.cors.sh/" + API_URL,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'x-cors-api-key': 'temp_123456' // публичный ключ для cors.sh
                }
            },
            {
                name: "cors.bridged",
                url: "https://cors.bridged.cc/" + API_URL,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                }
            },
            {
                name: "allorigins",
                url: "https://api.allorigins.win/raw?url=" + encodeURIComponent(API_URL),
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                }
            },
            {
                name: "codetabs",
                url: "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(API_URL),
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                }
            },
            {
                name: "workers proxy",
                url: "https://cors-proxy4.p.rapidapi.com/?url=" + encodeURIComponent(API_URL),
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                }
            }
        ];

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const rateLimitNotice = document.getElementById('rateLimitNotice');

        let isWaitingForResponse = false;
        let lastRequestTime = 0;
        const RATE_LIMIT_SECONDS = 25;

        function addMessage(text, isUser = false, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : (isError ? 'error-message' : 'bot-message')}`;
            
            if (!isUser && !isError) {
                messageDiv.innerHTML = `
                    ${text}
                    <div class="message-info">
                        ⚡ ответ от ApiFreeLLM
                    </div>
                `;
            } else {
                messageDiv.textContent = text;
            }
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Универсальная отправка через все методы
        async function tryAllMethods(userMessage) {
            const requestBody = { message: userMessage };
            const errors = [];

            // Пробуем каждый метод по очереди
            for (const method of METHODS) {
                try {
                    console.log(`Пробуем метод: ${method.name}`);
                    
                    const response = await fetch(method.url, {
                        method: 'POST',
                        headers: method.headers,
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    console.log(`Успех через ${method.name}:`, data);
                    
                    // Извлекаем ответ
                    let botReply = "Получен ответ";
                    if (data.response) botReply = data.response;
                    else if (data.message) botReply = data.message;
                    else if (data.contents) botReply = data.contents;
                    else if (data.body) botReply = data.body;
                    else if (typeof data === 'string') botReply = data;
                    else botReply = JSON.stringify(data);
                    
                    return { success: true, reply: botReply, method: method.name };
                    
                } catch (error) {
                    console.log(`Метод ${method.name} не сработал:`, error.message);
                    errors.push(`${method.name}: ${error.message}`);
                }
            }
            
            return { success: false, errors };
        }

        async function sendToAPI(userMessage) {
            try {
                isWaitingForResponse = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                
                showTypingIndicator();
                addMessage("🔄 Пробую разные способы подключения...", false, true);

                const result = await tryAllMethods(userMessage);
                
                removeTypingIndicator();
                
                // Удаляем временное сообщение
                const lastMsg = messagesDiv.lastChild;
                if (lastMsg && lastMsg.textContent.includes("Пробую разные способы")) {
                    lastMsg.remove();
                }

                if (result.success) {
                    addMessage(`✅ [${result.method}] ${result.reply}`, false);
                } else {
                    addMessage(`❌ Не удалось подключиться ни через один метод.`, false, true);
                    addMessage(`💡 Самое надежное решение:\n1. Установи расширение "CORS Unblock" для Chrome\n2. Включи его\n3. Обнови страницу`, false, true);
                }

                lastRequestTime = Date.now();
                
                // Показываем rate limit
                rateLimitNotice.style.display = 'block';
                setTimeout(() => {
                    rateLimitNotice.style.display = 'none';
                }, 5000);

            } catch (error) {
                removeTypingIndicator();
                console.error('Глобальная ошибка:', error);
                addMessage(`❌ Системная ошибка: ${error.message}`, false, true);
            } finally {
                isWaitingForResponse = false;
                userInput.disabled = false;
                userInput.focus();
                sendBtn.disabled = false;
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (message === '' || isWaitingForResponse) return;

            const now = Date.now();
            const timeSinceLastRequest = (now - lastRequestTime) / 1000;
            
            if (timeSinceLastRequest < RATE_LIMIT_SECONDS && lastRequestTime !== 0) {
                rateLimitNotice.style.display = 'block';
                rateLimitNotice.textContent = `⏳ Подождите ${Math.ceil(RATE_LIMIT_SECONDS - timeSinceLastRequest)} сек. (rate limit)`;
                return;
            }

            addMessage(message, true);
            userInput.value = '';
            await sendToAPI(message);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        console.log('✅ Бот готов. Доступные методы:', METHODS.map(m => m.name).join(', '));
    </script>
</body>
</html>
