<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Чат на ApiFreeLLM (с CORS-прокси)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f6f8fc 0%, #e9ecf3 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 22px 28px;
            background: #1a2b3e;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header p {
            margin: 6px 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
        }
        .api-key-badge {
            background: #2d3f57;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 12px;
            display: inline-block;
            border: 1px solid #4a5f7a;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f9fafc;
        }
        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 22px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-message {
            background: #1a2b3e;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .bot-message {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0,0,0,0.07);
        }
        .message-info {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rate-limit-note {
            background: #eef2ff;
            color: #1e3a8a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin: 10px 0;
            align-self: center;
            display: inline-block;
        }
        .input-area {
            padding: 22px 24px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
        }
        #userInput {
            flex: 1;
            padding: 16px 22px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            outline: none;
            font-size: 1rem;
            transition: 0.2s;
            background: #f8fafc;
        }
        #userInput:focus {
            border-color: #1a2b3e;
            background: white;
        }
        #sendBtn {
            background: #1a2b3e;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 36px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px -8px #1a2b3e;
        }
        #sendBtn:hover { background: #2d3f57; transform: scale(1.02); }
        #sendBtn:disabled {
            background: #94a3b8;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 22px;
            background: white;
            border-radius: 26px;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0,0,0,0.07);
        }
        .typing-indicator span {
            width: 9px;
            height: 9px;
            background: #1a2b3e;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 12px 18px;
            border-radius: 16px;
            align-self: center;
        }
        .cors-badge {
            background: #854d0e;
            color: #ffedd5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>⚡ Free AI Chat <span class="cors-badge">CORS-прокси</span></h1>
            <p>Работает через ApiFreeLLM · безлимитные сообщения · задержка 25с</p>
            <div class="api-key-badge">🔑 apf_i6fhd1fenfma3zg2ceoaa5y5</div>
        </div>

        <div id="messages" class="messages-area">
            <div class="message bot-message">
                👋 Привет! Я использую CORS-прокси для обхода ограничений API.
                <div class="message-info">⚡ 200B+ model · rate limit: 25 сек</div>
            </div>
        </div>

        <div id="rateLimitNotice" class="rate-limit-note" style="display: none;">
            ⏳ Пожалуйста, подождите 25 секунд перед следующим запросом
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твое сообщение..." autofocus>
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        // Конфигурация
        const API_KEY = "apf_i6fhd1fenfma3zg2ceoaa5y5";
        const API_URL = "https://apifreellm.com/api/v1/chat";
        
        // Публичные CORS-прокси (если один упадет, используем другой)
        const CORS_PROXIES = [
            "https://corsproxy.io/?",
            "https://api.allorigins.win/raw?url=",
            "https://cors-anywhere.herokuapp.com/"
        ];
        
        // Выбираем случайный прокси для распределения нагрузки
        const CORS_PROXY = CORS_PROXIES[Math.floor(Math.random() * CORS_PROXIES.length)];

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const rateLimitNotice = document.getElementById('rateLimitNotice');

        let isWaitingForResponse = false;
        let lastRequestTime = 0;
        const RATE_LIMIT_SECONDS = 25;

        function addMessage(text, isUser = false, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : (isError ? 'error-message' : 'bot-message')}`;
            
            if (!isUser && !isError) {
                messageDiv.innerHTML = `
                    ${text}
                    <div class="message-info">
                        ⚡ ответ от ApiFreeLLM · 200B+ model
                    </div>
                `;
            } else if (isError) {
                messageDiv.textContent = `❌ ${text}`;
            } else {
                messageDiv.textContent = text;
            }
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function updateRateLimitStatus() {
            const now = Date.now();
            const timeSinceLastRequest = (now - lastRequestTime) / 1000;
            
            if (timeSinceLastRequest < RATE_LIMIT_SECONDS && lastRequestTime !== 0) {
                const remainingTime = Math.ceil(RATE_LIMIT_SECONDS - timeSinceLastRequest);
                rateLimitNotice.style.display = 'block';
                rateLimitNotice.textContent = `⏳ Rate limit: подождите ${remainingTime} сек. перед следующим запросом`;
                sendBtn.disabled = true;
                
                setTimeout(updateRateLimitStatus, 1000);
            } else {
                rateLimitNotice.style.display = 'none';
                if (!isWaitingForResponse) {
                    sendBtn.disabled = false;
                }
            }
        }

        async function sendToAPI(userMessage) {
            try {
                isWaitingForResponse = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                
                showTypingIndicator();

                // Подготавливаем запрос
                const requestBody = {
                    message: userMessage
                };

                // Кодируем URL для прокси
                const encodedApiUrl = encodeURIComponent(API_URL);
                const proxyUrl = CORS_PROXY + encodedApiUrl;

                console.log('Используем прокси:', CORS_PROXY);
                console.log('Отправка запроса:', requestBody);

                // Отправляем через CORS-прокси
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });

                removeTypingIndicator();

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                console.log('Ответ API:', data);

                // Извлекаем ответ
                let botReply = "Получен пустой ответ";
                
                if (typeof data === 'string') {
                    botReply = data;
                } else if (data.response) {
                    botReply = data.response;
                } else if (data.message) {
                    botReply = data.message;
                } else if (data.content) {
                    botReply = data.content;
                } else if (data.choices && data.choices[0]) {
                    botReply = data.choices[0].message?.content || data.choices[0].text;
                } else {
                    botReply = "Ответ получен в неожиданном формате: " + JSON.stringify(data);
                }

                addMessage(botReply, false);

                lastRequestTime = Date.now();
                updateRateLimitStatus();

            } catch (error) {
                removeTypingIndicator();
                console.error('Ошибка:', error);
                
                let errorMessage = error.message;
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMessage = 'Не удалось подключиться к API. Проблема с CORS или прокси. Попробуйте другой браузер или включите CORS-расширение.';
                }
                
                addMessage(`Ошибка: ${errorMessage}`, false, true);
                
                // Предлагаем альтернативный метод
                addMessage('💡 Совет: Установите расширение "CORS Unblock" для Chrome или "CORS Everywhere" для Firefox и отключите прокси', false, true);
            } finally {
                isWaitingForResponse = false;
                userInput.disabled = false;
                userInput.focus();
                updateRateLimitStatus();
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (message === '' || isWaitingForResponse) return;

            const now = Date.now();
            const timeSinceLastRequest = (now - lastRequestTime) / 1000;
            
            if (timeSinceLastRequest < RATE_LIMIT_SECONDS && lastRequestTime !== 0) {
                const remainingTime = Math.ceil(RATE_LIMIT_SECONDS - timeSinceLastRequest);
                rateLimitNotice.style.display = 'block';
                rateLimitNotice.textContent = `⏳ Пожалуйста, подождите ${remainingTime} сек. (rate limit)`;
                return;
            }

            addMessage(message, true);
            userInput.value = '';
            await sendToAPI(message);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        updateRateLimitStatus();
        
        console.log('✅ Чат готов. Используется CORS-прокси:', CORS_PROXY);
    </script>
</body>
</html>
